<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Phone Store Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <div class="hero-top">
          <h1>Admin Product Management</h1>
          <a class="admin-link" href="/">Back to Store</a>
        </div>
        <p>Simple and clean CRUD page for final project demo</p>
      </div>
    </header>

    <main class="container admin-page">
      <section class="admin-card admin-login-card" id="auth-card">
        <h2>Admin Login</h2>

        <form id="login-form" class="admin-form login-form-grid">
          <div class="field-group">
            <label for="admin-username">Username</label>
            <input id="admin-username" type="text" placeholder="admin" required />
          </div>

          <div class="field-group">
            <label for="admin-password">Password</label>
            <input id="admin-password" type="password" placeholder="••••••" required />
          </div>

          <div class="admin-actions">
            <button type="submit" class="btn-primary">Login</button>
            <button type="button" class="btn-neutral hidden" id="logout-btn">Logout</button>
          </div>
        </form>

        <p id="auth-status" class="result-count">Current role: Guest (view only)</p>
      </section>

      <section class="admin-card hidden" id="editor-card">
        <h2>Add / Edit Product</h2>
        <form id="admin-form" class="admin-form">
          <input type="hidden" id="editing-original-id" />

          <div class="admin-grid">
            <div class="field-group">
              <label for="id">ID *</label>
              <input id="id" type="number" min="1" required />
            </div>

            <div class="field-group">
              <label for="name">Name *</label>
              <input id="name" type="text" required />
            </div>

            <div class="field-group">
              <label for="brand">Brand *</label>
              <input id="brand" type="text" required />
            </div>

            <div class="field-group">
              <label for="price">Price (VND) *</label>
              <input id="price" type="number" min="0" required />
            </div>

            <div class="field-group field-span-2">
              <label for="image">Image URL *</label>
              <input id="image" type="url" required />
            </div>

            <div class="field-group field-span-2">
              <label for="shortDescription">Short Description</label>
              <textarea id="shortDescription" rows="2" placeholder="Short text for card view"></textarea>
            </div>

            <div class="field-group field-span-2">
              <label for="fullDescription">Full Description</label>
              <textarea id="fullDescription" rows="3" placeholder="Detailed product description"></textarea>
            </div>

            <div class="field-group field-span-2">
              <label for="tags">Tags (comma separated)</label>
              <input id="tags" type="text" placeholder="gaming, camera, battery" />
            </div>

            <div class="field-group field-span-2">
              <label for="specs">Specs (JSON)</label>
              <textarea
                id="specs"
                rows="4"
                placeholder='{"display":"6.7-inch OLED","processor":"Snapdragon 8 Gen 3","ram":"12 GB","storage":"256 GB","battery":"5000 mAh","camera":"50MP + 12MP"}'
              ></textarea>
            </div>
          </div>

          <div class="admin-actions">
            <button type="submit" class="btn-primary" id="submit-btn">Add Product</button>
            <button type="button" class="btn-neutral" id="cancel-edit">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <h2>Product List</h2>
        <p id="admin-count" class="result-count"></p>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Price</th>
                <th>Tags</th>
                <th id="actions-header" class="hidden">Actions</th>
              </tr>
            </thead>
            <tbody id="admin-product-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
