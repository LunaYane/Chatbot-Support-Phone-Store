<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Phone Store Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <div class="hero-top">
          <h1>Admin Product Management</h1>
          <a class="admin-link" href="/">Back to Store</a>
        </div>
        <p>Simple CRUD page for university project demo</p>
      </div>
    </header>

    <main class="container admin-page">
      <section class="admin-card">
        <h2>Add / Edit Product</h2>
        <form id="admin-form" class="admin-form">
          <input type="hidden" id="product-id" />

          <div class="admin-grid">
            <div class="field-group">
              <label for="name">Name *</label>
              <input id="name" type="text" required />
            </div>

            <div class="field-group">
              <label for="brand">Brand *</label>
              <input id="brand" type="text" required />
            </div>

            <div class="field-group">
              <label for="price">Price (VND) *</label>
              <input id="price" type="number" min="0" required />
            </div>

            <div class="field-group field-span-2">
              <label for="image">Image URL *</label>
              <input id="image" type="url" required />
            </div>

            <div class="field-group field-span-2">
              <label for="description">Description *</label>
              <textarea id="description" rows="3" required></textarea>
            </div>

            <div class="field-group">
              <label for="display">Display</label>
              <input id="display" type="text" />
            </div>

            <div class="field-group">
              <label for="processor">Processor</label>
              <input id="processor" type="text" />
            </div>

            <div class="field-group">
              <label for="ram">RAM</label>
              <input id="ram" type="text" />
            </div>

            <div class="field-group">
              <label for="storage">Storage</label>
              <input id="storage" type="text" />
            </div>

            <div class="field-group">
              <label for="battery">Battery</label>
              <input id="battery" type="text" />
            </div>

            <div class="field-group">
              <label for="camera">Camera</label>
              <input id="camera" type="text" />
            </div>
          </div>

          <div class="admin-actions">
            <button type="submit" class="btn-primary" id="submit-btn">Add Product</button>
            <button type="button" class="btn-neutral" id="cancel-edit">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <h2>Product List</h2>
        <p id="admin-count" class="result-count"></p>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-product-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
