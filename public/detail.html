<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail - Phone Store Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <h1>Phone Store Demo</h1>
        <p>Trang chi tiết sản phẩm</p>
      </div>
    </header>

    <main class="container">
      <div class="detail-topbar">
        <a class="back-link" href="/">← Quay lại trang chủ</a>
        <a class="cart-button" href="/checkout">🛒 Giỏ hàng <span id="cart-count">0</span></a>
      </div>
      <section id="product-detail"></section>
    </main>

    <button id="chat-toggle" class="chat-toggle" type="button">💬 Chat</button>

    <section id="chatbox" class="chatbox hidden" aria-label="Support chatbox">
      <header class="chatbox-header">
        <h3>Support Chat</h3>
        <button id="chat-close" type="button" class="chat-close">✕</button>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div class="chat-message bot">Hi! I am Phone Store Bot. Ask me about products, price, or brand.</div>
      </div>

      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Type your message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </section>

    <div id="toast-container" class="toast-container"></div>

    <script src="cart.js"></script>
    <script src="chat.js"></script>
    <script src="detail.js"></script>
  </body>
</html>
