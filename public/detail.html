<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail - Phone Store Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="container topbar-inner">
        <span>🚚 Miễn phí giao nhanh nội thành cho đơn từ 5 triệu</span>
        <span>☎ Hotline: 1900 1234</span>
      </div>
    </div>

    <header class="site-header" id="site-header">
      <div class="container header-inner">
        <a class="brand-logo" href="/" aria-label="Trang chủ Phone Store">
          <span class="brand-logo-dot"></span>
          <span>Phone Store</span>
        </a>
        <div class="header-actions">
          <a class="cart-button" href="/checkout">🛒 Giỏ hàng <span id="cart-count">0</span></a>
        </div>
      </div>
    </header>

    <main class="container section-gap">
      <div class="detail-topbar">
        <a class="back-link" href="/">← Quay lại trang chủ</a>
      </div>
      <section id="product-detail"></section>
    </main>

    <button id="chat-toggle" class="chat-toggle" type="button">💬 Chat</button>

    <section id="chatbox" class="chatbox hidden" aria-label="Support chatbox">
      <header class="chatbox-header">
        <h3>Phone Store Assistant</h3>
        <button id="chat-close" type="button" class="chat-close">✕</button>
      </header>
      <div id="chat-messages" class="chat-messages">
        <div class="chat-message bot">Xin chào! Bạn cần tư vấn điện thoại nào hôm nay?</div>
      </div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Nhập câu hỏi..." autocomplete="off" />
        <button type="submit">Gửi</button>
      </form>
    </section>

    <div id="toast-container" class="toast-container"></div>

    <script src="cart.js"></script>
    <script src="chat.js"></script>
    <script src="detail.js"></script>
  </body>
</html>
